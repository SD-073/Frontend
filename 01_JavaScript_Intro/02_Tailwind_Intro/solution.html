<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailwindCSS Intro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav aria-label="Main navigation" class="bg-indigo-500 p-4">
        <ul class="flex justify-around text-white font-bold text-lg">
          <li><a href="#" class="p-4 hover:bg-indigo-400">HOME</a></li>
          <li><a href="#" class="p-4 hover:bg-indigo-400">ABOUT</a></li>
          <li><a href="#" class="p-4 hover:bg-indigo-400">SERVICES</a></li>
          <li><a href="#" class="p-4 hover:bg-indigo-400">CONTACT</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section aria-labelledby="gallery-title" class="container mx-auto px-4">
        <header>
          <h1 id="gallery-title">ART GALLERY</h1>
        </header>

        <section
          aria-label="Gallery images"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"
        >
          <figure>
            <img
              src="https://picsum.photos/400"
              alt="Gallery image 1"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/500"
              alt="Gallery image 2"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/600"
              alt="Gallery image 3"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/700"
              alt="Gallery image 4"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/800"
              alt="Gallery image 5"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/900"
              alt="Gallery image 6"
              class="w-full h-auto"
            />
          </figure>
        </section>
      </section>
    </main>

    <footer class="bg-indigo-500 text-white p-4 mt-4">
      <section
        aria-label="Footer content"
        class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8"
      >
        <div>
          <h2 class="text-xl font-bold">LOGO</h2>
        </div>

        <section aria-labelledby="about-us-title">
          <h2 id="about-us-title" class="text-xl font-bold mb-4">About Us</h2>
          <ul>
            <li><a href="#">Legal</a></li>
            <li><a href="#">Jobs</a></li>
            <li><a href="#">Guidelines</a></li>
            <li><a href="#">Terms of Service</a></li>
          </ul>
        </section>

        <section aria-labelledby="contact-title">
          <h2 id="contact-title" class="text-xl font-bold mb-4">Contact</h2>
          <ul>
            <li><a href="#">FAQ</a></li>
            <li><a href="#">Support</a></li>
            <li><a href="#">Sponsorship</a></li>
            <li><a href="#">Cookies Policy</a></li>
          </ul>
        </section>

        <section aria-labelledby="social-media-title">
          <h2 id="social-media-title" class="text-xl font-bold mb-4">
            Social Media
          </h2>
          <ul>
            <li><a href="#">Social Media 1</a></li>
            <li><a href="#">Social Media 2</a></li>
            <li><a href="#">Social Media 3</a></li>
          </ul>
        </section>

        <section aria-labelledby="newsletter-title">
          <h2 id="newsletter-title" class="text-xl font-bold mb-4">
            Join Our Newsletter
          </h2>
          <form>
            <input
              type="email"
              placeholder="Enter your E-mail"
              class="p-2 rounded border-2"
            />
            <button
              type="submit"
              class="p-2 bg-yellow-500 font-semibold rounded hover:bg-yellow-400 hover:cursor-pointer"
            >
              Subscribe
            </button>
          </form>
        </section>
      </section>
    </footer>
  </body>
</html>
