<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailwindCSS Intro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header>
      <nav aria-label="Main navigation">
        <ul class="">
          <li><a href="#">HOME</a></li>
          <li><a href="#">ABOUT</a></li>
          <li><a href="#">SERVICES</a></li>
          <li><a href="#">CONTACT</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section aria-labelledby="gallery-title">
        <header>
          <h1 id="gallery-title">ART GALLERY</h1>
        </header>

        <section aria-label="Gallery images">
          <figure>
            <img
              src="https://picsum.photos/400"
              alt="Gallery image 1"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/500"
              alt="Gallery image 2"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/600"
              alt="Gallery image 3"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/700"
              alt="Gallery image 4"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/800"
              alt="Gallery image 5"
              class="w-full h-auto rounded-lg"
            />
          </figure>

          <figure>
            <img
              src="https://picsum.photos/900"
              alt="Gallery image 6"
              class="w-full h-auto rounded-lg"
            />
          </figure>
        </section>
      </section>
    </main>

    <footer>
      <section aria-label="Footer content">
        <div>
          <h2>LOGO</h2>
        </div>

        <section aria-labelledby="about-us-title">
          <h2 id="about-us-title">About Us</h2>
          <ul>
            <li><a href="#">Legal</a></li>
            <li><a href="#">Jobs</a></li>
            <li><a href="#">Guidelines</a></li>
            <li><a href="#">Terms of Service</a></li>
          </ul>
        </section>

        <section aria-labelledby="contact-title">
          <h2 id="contact-title">Contact</h2>
          <ul>
            <li><a href="#">FAQ</a></li>
            <li><a href="#">Support</a></li>
            <li><a href="#">Sponsorship</a></li>
            <li><a href="#">Cookies Policy</a></li>
          </ul>
        </section>

        <section aria-labelledby="social-media-title">
          <h2 id="social-media-title">Social Media</h2>
          <ul>
            <li><a href="#">Social Media 1</a></li>
            <li><a href="#">Social Media 2</a></li>
            <li><a href="#">Social Media 3</a></li>
          </ul>
        </section>

        <section aria-labelledby="newsletter-title">
          <h2 id="newsletter-title">Join Our Newsletter</h2>
          <form>
            <input
              type="email"
              placeholder="Enter your E-mail"
              class="p-2 rounded"
            />
            <button type="submit">Subscribe</button>
          </form>
        </section>
      </section>
    </footer>
  </body>
</html>
